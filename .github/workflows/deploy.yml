# =====================================================
# CI/CD Pipeline — Build & Deploy to Azure App Service
# =====================================================
# Triggers on push to 'main' branch.
# Builds Docker image, pushes to Azure Container Registry,
# and deploys to Azure App Service.
# =====================================================

name: Build & Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

env:
  AZURE_WEBAPP_NAME: finance-analyzer-api  # Change to your App Service name
  ACR_NAME: financeanalyzerregistry        # Change to your ACR name

jobs:
  # ── Test ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run basic import & health check
        run: |
          python -c "from server.config import APP_ENV; print(f'Config loaded: {APP_ENV}')"
          echo "✅ Import check passed"

  # ── Build & Push Docker Image ────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push Docker image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.AZURE_WEBAPP_NAME }}:${{ github.sha }} \
                        -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.AZURE_WEBAPP_NAME }}:latest .
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.AZURE_WEBAPP_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.AZURE_WEBAPP_NAME }}:latest

  # ── Deploy to Azure App Service ──────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          images: ${{ env.ACR_NAME }}.azurecr.io/${{ env.AZURE_WEBAPP_NAME }}:${{ github.sha }}

      - name: Health check
        run: |
          echo "⏳ Waiting 30s for deployment to stabilize..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/health)
          if [ "$STATUS" == "200" ]; then
            echo "✅ Deployment healthy!"
          else
            echo "⚠️  Health check returned $STATUS (may still be starting)"
          fi
