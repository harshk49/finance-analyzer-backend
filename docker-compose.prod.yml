# =====================================================
# Production Docker Compose — Azure Deployment
# =====================================================
# Usage:
#   docker compose -f docker-compose.prod.yml up --build -d
#
# NOTE: In Azure, the database is provided by Azure Database
# for PostgreSQL, so the `db` service here is for local
# production-mirror testing only.
# =====================================================
version: "3.9"

services:
  # ── FastAPI App ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance_analyzer_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DEBUG=false
      - LOG_LEVEL=WARNING
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-finance_analyzer}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-finance_analyzer}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-finance_analyzer}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://your-frontend.azurestaticapps.net}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ── PostgreSQL (local production mirror) ────────────
  db:
    image: postgres:16-alpine
    container_name: finance_analyzer_db_prod
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-finance_analyzer}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-finance_analyzer}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_prod:
    driver: local
